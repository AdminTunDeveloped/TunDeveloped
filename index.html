<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.main{width:100%;max-width:420px;padding:20px}

.card{
  background:linear-gradient(180deg,#1a0000,#330000);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 50px rgba(255,0,0,0.7);
  text-align:center;
  border:1px solid #ff1a1a;
}

/* TITLE */
.title{
  font-family:'Bebas Neue',sans-serif;
  font-size:42px;
  letter-spacing:4px;
  color:#ff0000;
  text-shadow:0 0 10px #ff4d4d,0 0 20px #ff1a1a;
}

/* TAG */
.tag{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
}

.tag span{
  font-size:12px;
  padding:6px 12px;
  border-radius:999px;
  background:#330000;
  border:1px solid #ff1a1a;
  color:#ff6666;
  text-shadow:0 0 4px #ff1a1a;
}

/* BOX */
.box{
  margin-top:18px;
  padding:18px;
  border-radius:18px;
  background:#330000;
  border:1px solid #ff1a1a;
  box-shadow:0 0 20px rgba(255,0,0,0.5);
}

/* TITLE BOX */
.box-title{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:15px;
  font-weight:600;
  color:#ff3333;
  margin-bottom:10px;
  text-shadow:0 0 8px #ff1a1a;
}

.box-title span{
  font-size:18px;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ff1a1a;
  background:#000;
  color:white;
  font-size:14px;
  margin-bottom:12px;
  box-shadow:0 0 8px #ff1a1a inset;
}

input:focus{
  outline:none;
  border-color:#ff4d4d;
  box-shadow:0 0 12px #ff4d4d inset;
}

/* BUTTON RED-NEON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(90deg,#ff1a1a,#cc0000);
  color:white;
  text-shadow:0 0 5px #ff9999;
  box-shadow:0 0 15px #ff1a1a,0 0 30px #ff4d4d;
  transition:0.25s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 25px #ff1a1a,0 0 50px #ff4d4d;
}

.btn:active{
  transform:scale(0.96);
  box-shadow:0 0 15px #ff1a1a,0 0 30px #ff4d4d;
}

/* RESULT */
.result{margin-top:12px;font-size:13px}
.success{color:#22c55e;text-shadow:0 0 5px #22c55e}
.error{color:#ff3333;text-shadow:0 0 5px #ff1a1a}

/* HISTORY */
.history{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  background:#330000;
  border:1px solid #ff1a1a;
  font-size:12px;
  text-align:left;
  max-height:160px;
  overflow:auto;
  box-shadow:0 0 10px rgba(255,0,0,0.5);
}

.history-item{
  margin-top:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* FAB */
.fab{
  position:fixed;
  bottom:90px;
  right:18px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(90deg,#ff1a1a,#cc0000);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:999;
  color:white;
  font-size:22px;
  box-shadow:0 0 25px #ff1a1a,0 0 50px #ff4d4d;
  transition:0.25s;
}

/* MENU */
.menu{
  position:fixed;
  bottom:160px;
  right:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  opacity:0;
  pointer-events:none;
  transform:translateY(10px);
  transition:0.25s;
  z-index:999;
}

.menu a{
  width:160px;
  padding:12px;
  border-radius:14px;
  background:#330000;
  color:white;
  text-align:center;
  text-decoration:none;
  border:1px solid #ff1a1a;
  box-shadow:0 0 10px #ff1a1a;
}

.menu.show{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

/* MODAL ƯU ĐÃI */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.modal-box{
  background:#330000;
  padding:20px;
  border-radius:16px;
  text-align:center;
  border:1px solid #ff1a1a;
  box-shadow:0 0 20px #ff1a1a;
  width:90%;
  max-width:300px;
}

.modal-box h3{
  color:#ff3333;
  text-shadow:0 0 10px #ff4d4d;
}

.modal-box p{
  color:white;
  text-shadow:0 0 6px #ff1a1a;
}

</style>
</head>

<body>

<div class="main">
<div class="card">

<div class="title">TUN DEVELOPED</div>

<div class="tag">
<span>🟢 Server Online</span>
<span>🚀 Hiệu suất cao</span>
<span>🔐 Bảo mật</span>
</div>

<div class="box">
<div class="box-title"><span>💎</span> KEY VIP</div>
<input id="vip" placeholder="Nhập KEY VIP">
<button class="btn" onclick="vip()">KÍCH HOẠT VIP</button>
</div>

<div class="box">
<div class="box-title"><span>🎁</span> KEY FREE</div>
<input id="free" placeholder="Nhập KEY FREE">
<button class="btn" onclick="freeKey()">NHẬN KEY FREE</button>
</div>

<div id="result" class="result"></div>

<div id="history" class="history"></div>
<button class="btn" onclick="clearHis()">🗑 Xóa lịch sử</button>

</div>
</div>

<div class="fab" onclick="toggle()">💬</div>

<div id="menu" class="menu">
<a href="https://zalo.me/0378099746" target="_blank">💬 Zalo</a>
<a href="https://t.me/TunDeveloped" target="_blank">📢 Telegram</a>
<a href="https://www.facebook.com/share/1Ea2ZvmwRa/?mibextid=wwXIfr">🌐 Facebook</a>
</div>

<div id="popup" class="modal" style="display:none">
<div class="modal-box">
<h3>🎉 ƯU ĐÃI</h3>
<p>
🔥 Nhập KEY FREE nhận tool miễn phí<br>
💎 VIP đang giảm giá cực mạnh
</p>
<button class="btn" onclick="closePopup()">OK</button>
</div>
</div>

<script>
const CONFIG_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/config.json";
const KEY_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/key.json";
let CONFIG={},KEY_DATA={};
let history=JSON.parse(localStorage.getItem("his"))||[];

async function load(){
  try{
    CONFIG=await (await fetch(CONFIG_URL+"?t="+Date.now())).json();
    KEY_DATA=await (await fetch(KEY_URL+"?t="+Date.now())).json();
  }catch(e){}
}

window.onload=()=>{document.getElementById("popup").style.display="flex";}
function closePopup(){document.getElementById("popup").style.display="none";}

function save(type,link){
  history.unshift({type,link});
  if(history.length>10)history.length=10;
  localStorage.setItem("his",JSON.stringify(history));
  render();
}

function render(){
  let h=document.getElementById("history");
  if(history.length==0){h.innerHTML="📜 Chưa có lịch sử";return;}
  h.innerHTML="<b>📜 Lịch sử:</b>"+history.map(i=>`
    <div class="history-item">
      <span>${i.type}</span>
      <button class="btn" onclick="copy('${i.link}')">COPY</button>
    </div>`).join("");
}

function copy(t){navigator.clipboard.writeText(t);alert("Đã copy link");}

function vip(){
  let k=document.getElementById("vip").value.trim();
  let obj=KEY_DATA.personal_keys?.find(x=>x.key.trim()===k);
  if(!obj) return err("❌ Key VIP sai");
  let link=CONFIG.scripts?.[(obj.platform||"android")+"_full"];
  save("💎 VIP",link);ok("✔ VIP kích hoạt thành công");
}

function freeKey(){
  let k=document.getElementById("free").value.trim();
  if(!KEY_DATA.community_keys?.includes(k)) return err("❌ Key FREE sai");
  let link=CONFIG.scripts?.android_free;
  save("🎁 FREE",link);ok("✔ Nhận FREE thành công");
}

function err(t){document.getElementById("result").innerHTML="<div class='error'>"+t+"</div>";}
function ok(t){document.getElementById("result").innerHTML="<div class='success'>"+t+"</div>";}
function clearHis(){history=[];localStorage.removeItem("his");render();}
function toggle(){document.getElementById("menu").classList.toggle("show");}
load();render();
</script>

</body>
</html>
