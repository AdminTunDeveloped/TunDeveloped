<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Poppins', sans-serif;
    background:#0a0a0a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* MAIN CARD */
.main{width:100%;max-width:420px;padding:20px}

.card{
    background:#1a1a1a;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 30px rgba(255,0,0,0.3);
    text-align:center;
    border:1px solid rgba(255,0,0,0.2);
}

/* TITLE */
.title{
    font-family:'Orbitron', sans-serif;
    font-size:42px;
    letter-spacing:3px;
    color:#ff2b2b;
    text-shadow:0 0 8px #ff4c4c, 0 0 20px #ff1a1a;
    margin-bottom:15px;
}

/* TAG */
.tag{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin-bottom:15px;
}

.tag span{
    font-size:12px;
    padding:5px 12px;
    border-radius:999px;
    background:#1a1a1a;
    border:1px solid #ff2b2b;
    color:#ff6666;
}

/* BOX */
.box{
    margin-top:18px;
    padding:20px;
    border-radius:16px;
    background:#121212;
    border:1px solid #ff2b2b;
    box-shadow:0 0 12px rgba(255,0,0,0.3);
}

/* BOX TITLE */
.box-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:16px;
    font-weight:700;
    color:#ff3b3b;
    margin-bottom:12px;
    text-shadow:0 0 6px #ff2b2b;
}

.box-title span{
    font-size:18px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ff2b2b;
    background:#1a1a1a;
    color:white;
    font-size:14px;
    margin-bottom:12px;
    transition:0.25s;
}

input:focus{
    outline:none;
    border-color:#ff4c4c;
    box-shadow:0 0 12px rgba(255,0,0,0.5);
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:999px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    background:linear-gradient(90deg,#ff1a1a,#ff4c4c);
    color:#fff;
    text-transform:uppercase;
    box-shadow:0 0 12px rgba(255,0,0,0.4);
    transition:0.25s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(255,0,0,0.6),0 0 40px rgba(255,0,0,0.3);
}

.btn:active{
    transform:scale(0.96);
}

/* RESULT */
.result{margin-top:12px;font-size:13px}
.success{color:#22c55e;text-shadow:0 0 4px #22c55e;}
.error{color:#ff4c4c;text-shadow:0 0 4px #ff2b2b;}

/* HISTORY */
.history{
    margin-top:12px;
    padding:10px;
    border-radius:12px;
    background:#121212;
    border:1px solid #ff2b2b;
    font-size:12px;
    text-align:left;
    max-height:160px;
    overflow:auto;
    box-shadow:0 0 8px rgba(255,0,0,0.2);
}

.history-item{
    margin-top:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* FAB */
.fab{
    position:fixed;
    bottom:90px;
    right:18px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:#ff1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:999;
    color:#fff;
    font-size:22px;
    box-shadow:0 0 15px #ff4c4c;
}

/* MENU */
.menu{
    position:fixed;
    bottom:160px;
    right:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
    opacity:0;
    pointer-events:none;
    transform:translateY(10px);
    transition:0.25s;
    z-index:999;
}

.menu a{
    width:160px;
    padding:12px;
    border-radius:12px;
    background:#1a1a1a;
    color:#ff6666;
    text-align:center;
    text-decoration:none;
    border:1px solid #ff2b2b;
    box-shadow:0 0 8px rgba(255,0,0,0.3);
}

.menu.show{
    opacity:1;
    pointer-events:auto;
    transform:translateY(0);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2000;
}

.modal-box{
    background:#121212;
    padding:20px;
    border-radius:16px;
    text-align:center;
    border:1px solid #ff2b2b;
    box-shadow:0 0 12px rgba(255,0,0,0.4);
    width:90%;
    max-width:300px;
}

/* TITLE / POPUP TEXT */
.modal-box h3{
    color:#ff2b2b;
    text-shadow:0 0 8px #ff4c4c;
}
.modal-box p{
    margin:10px 0;
    font-size:14px;
    color:#ff6666;
}

</style>
</head>

<body>

<div class="main">
<div class="card">

<div class="title">TUN DEVELOPED</div>

<div class="tag">
<span>🟢 Server Online</span>
<span>🚀 Hiệu suất cao</span>
<span>🔐 Bảo mật</span>
</div>

<div class="box">
<div class="box-title"><span>💎</span> KEY VIP</div>
<input id="vip" placeholder="Nhập KEY VIP">
<button class="btn" onclick="vip()">KÍCH HOẠT VIP</button>
</div>

<div class="box">
<div class="box-title"><span>🎁</span> KEY FREE</div>
<input id="free" placeholder="Nhập KEY FREE">
<button class="btn" onclick="freeKey()">NHẬN KEY FREE</button>
</div>

<div id="result" class="result"></div>

<div id="history" class="history"></div>
<button class="btn" onclick="clearHis()">🗑 Xóa lịch sử</button>

</div>
</div>

<div class="fab" onclick="toggle()">💬</div>

<div id="menu" class="menu">
<a href="https://zalo.me/0378099746" target="_blank">💬 Zalo</a>
<a href="https://t.me/TunDeveloped" target="_blank">📢 Telegram</a>
<a href="https://www.facebook.com/share/1Ea2ZvmwRa/?mibextid=wwXIfr">🌐 Facebook</a>
</div>

<!-- POPUP -->
<div id="popup" class="modal" style="display:none">
<div class="modal-box">
<h3>🎉 ƯU ĐÃI</h3>
<p>
🔥 Nhập KEY FREE nhận tool miễn phí<br>
💎 VIP đang giảm giá cực mạnh
</p>
<button class="btn" onclick="closePopup()">OK</button>
</div>
</div>

<script>

const CONFIG_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/config.json";
const KEY_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/key.json";

let CONFIG={},KEY_DATA={};
let history=JSON.parse(localStorage.getItem("his"))||[];

async function load(){
try{
CONFIG=await (await fetch(CONFIG_URL+"?t="+Date.now())).json();
KEY_DATA=await (await fetch(KEY_URL+"?t="+Date.now())).json();
}catch(e){}
}

/* POPUP */
window.onload=()=>{
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function save(type,link){
history.unshift({type,link});
if(history.length>10)history.length=10;
localStorage.setItem("his",JSON.stringify(history));
render();
}

function render(){
let h=document.getElementById("history");

if(history.length==0){
h.innerHTML="📜 Chưa có lịch sử";
return;
}

h.innerHTML="<b>📜 Lịch sử:</b>"+history.map(i=>`
<div class="history-item">
<span>${i.type}</span>
<button class="btn" onclick="copy('${i.link}')">COPY</button>
</div>
`).join("");
}

function copy(t){
navigator.clipboard.writeText(t);
alert("Đã copy link");
}

function vip(){
let k=document.getElementById("vip").value.trim();
let obj=KEY_DATA.personal_keys?.find(x=>x.key.trim()===k);

if(!obj) return err("❌ Key VIP sai");

let link=CONFIG.scripts?.[(obj.platform||"android")+"_full"];

save("💎 VIP",link);
ok("✔ VIP kích hoạt thành công");
}

function freeKey(){
let k=document.getElementById("free").value.trim();

if(!KEY_DATA.community_keys?.includes(k))
return err("❌ Key FREE sai");

let link=CONFIG.scripts?.android_free;

save("🎁 FREE",link);
ok("✔ Nhận FREE thành công");
}

function err(t){
document.getElementById("result").innerHTML="<div class='error'>"+t+"</div>";
}

function ok(t){
document.getElementById("result").innerHTML="<div class='success'>"+t+"</div>";
}

function clearHis(){
history=[];
localStorage.removeItem("his");
render();
}

function toggle(){
document.getElementById("menu").classList.toggle("show");
}

load();
render();

</script>

</body>
</html>
