<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #05050a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

/* Background cyberpunk subtle */
body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
        linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: -2;
}

body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 30% 20%, rgba(120,0,255,0.08), transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0,255,200,0.08), transparent 50%);
    z-index: -1;
}

.main { width: 100%; max-width: 460px; padding: 20px; z-index: 2; }

.card {
    background: rgba(15, 23, 42, 0.65);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    border: 1px solid rgba(103, 232, 249, 0.15);
    padding: 36px 30px;
    box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6),
                inset 0 0 40px rgba(103, 232, 249, 0.08);
    text-align: center;
    position: relative;
}

/* Title + Icon */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
}

.title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px;
    letter-spacing: 5px;
    background: linear-gradient(90deg, #67e8f9, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 40px rgba(103, 232, 249, 0.6);
}

.tag {
    margin: 16px 0 24px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.tag span {
    font-size: 12.5px;
    padding: 7px 14px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(103,232,249,0.2);
    color: #a5b4fc;
}

/* Box */
.box {
    margin-top: 22px;
    padding: 22px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(103,232,249,0.1);
    text-align: left;
}

.box h3 {
    font-size: 15.5px;
    color: #67e8f9;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Input & Button */
input {
    width: 100%;
    padding: 15px 18px;
    border-radius: 14px;
    border: 1px solid rgba(103,232,249,0.2);
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 15.5px;
}

input:focus {
    border-color: #67e8f9;
    box-shadow: 0 0 0 4px rgba(103,232,249,0.15);
    outline: none;
}

.rgb-btn {
    margin-top: 12px;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(90deg, #67e8f9, #a78bfa);
    color: #0f172a;
    font-weight: 700;
    font-size: 15.5px;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 8px 25px rgba(103,232,249,0.3);
}

.rgb-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(103,232,249,0.4);
}

.rgb-btn:active { transform: scale(0.97); }

/* Result & History */
.result { margin: 18px 0; font-size: 15px; font-weight: 500; min-height: 28px; }

.success { color: #67e8f9; }
.error { color: #f87171; }

.history {
    margin-top: 26px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(103,232,249,0.1);
    max-height: 240px;
    overflow-y: auto;
    font-size: 14px;
}

.history-item {
    padding: 11px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.history-item:last-child { border: none; }

/* FAB & Menu */
.fab {
    position: fixed;
    bottom: 95px;
    right: 22px;
    width: 58px;
    height: 58px;
    background: rgba(15,23,42,0.9);
    border: 2px solid #67e8f9;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(103,232,249,0.25);
    z-index: 100;
    transition: 0.3s;
}

.fab:hover { background: #67e8f9; color: #0f172a; transform: rotate(20deg); }

.menu {
    position: fixed;
    bottom: 170px;
    right: 22px;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
    transition: 0.35s ease;
    z-index: 99;
}

.menu.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
}

.menu a {
    padding: 14px 20px;
    width: 180px;
    background: rgba(15,23,42,0.95);
    border: 1px solid rgba(103,232,249,0.2);
    border-radius: 16px;
    color: #fff;
    text-decoration: none;
    font-size: 14.5px;
    text-align: center;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(103,232,249,0.15);
    border-color: #67e8f9;
    transform: translateX(-6px);
}
</style>
</head>

<body>

<div class="main">
    <div class="card">
        <div class="header">
            <i class="fas fa-bolt" style="font-size:32px;color:#67e8f9;"></i>
            <div class="title">TUN DEVELOPED</div>
        </div>
        
        <div class="tag">
            <span>🟢 Server Online</span>
            <span>🚀 Hiệu suất cao</span>
            <span>🔐 Bảo mật</span>
        </div>

        <div class="box">
            <h3><i class="fas fa-gem"></i> KEY VIP</h3>
            <input id="vip" placeholder="Nhập KEY VIP" autocomplete="off">
            <button class="rgb-btn" onclick="vip()">KÍCH HOẠT VIP</button>
        </div>

        <div class="box">
            <h3><i class="fas fa-gift"></i> KEY FREE</h3>
            <input id="free" placeholder="Nhập KEY FREE" autocomplete="off">
            <button class="rgb-btn" onclick="freeKey()">NHẬN FREE</button>
        </div>

        <div id="result" class="result"></div>

        <div id="history" class="history"></div>
        <button class="rgb-btn" style="background:#334155;color:#e2e8f0;margin-top:12px;" onclick="clearHis()">🗑 Xóa lịch sử</button>
    </div>
</div>

<div class="fab" onclick="toggle()">💬</div>

<div id="menu" class="menu">
    <a href="https://zalo.me/0378099746" target="_blank"><i class="fab fa-whatsapp"></i> Zalo</a>
    <a href="https://t.me/TunDeveloped" target="_blank"><i class="fab fa-telegram"></i> Telegram</a>
    <a href="https://www.facebook.com/share/1Ea2ZvmwRa/?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
</div>

<script>
// Giữ nguyên toàn bộ script cũ của mày (load, vip, freeKey, save, render, copy, err, ok, clearHis, toggle)
const CONFIG_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/config.json";
const KEY_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/key.json";

let CONFIG = {}, KEY_DATA = {};
let history = JSON.parse(localStorage.getItem("his")) || [];

async function load() {
    try {
        CONFIG = await (await fetch(CONFIG_URL + "?t=" + Date.now())).json();
        KEY_DATA = await (await fetch(KEY_URL + "?t=" + Date.now())).json();
    } catch(e) { console.log("Lỗi load JSON"); }
}

function save(type, link) {
    history.unshift({type, link});
    if (history.length > 10) history.length = 10;
    localStorage.setItem("his", JSON.stringify(history));
    render();
}

function render() {
    let h = document.getElementById("history");
    if (history.length === 0) {
        h.innerHTML = "<span style='color:#64748b; font-style:italic;'>Chưa có lịch sử nào</span>";
        return;
    }
    h.innerHTML = history.map(i => `
        <div class="history-item">
            <span>${i.type}</span>
            <button class="rgb-btn" style="padding:7px 16px; font-size:13px; width:auto;" onclick="copy('${i.link}')">COPY</button>
        </div>
    `).join("");
}

function copy(t) {
    navigator.clipboard.writeText(t).then(() => alert("✅ Đã copy link!"));
}

function vip() { /* giữ nguyên code cũ */ 
    let k = document.getElementById("vip").value.trim();
    let obj = KEY_DATA.personal_keys?.find(x => x.key.trim() === k);
    if (!obj) return err("❌ Key VIP không đúng");
    let link = CONFIG.scripts?.[(obj.platform || "android") + "_full"];
    save("💎 VIP", link);
    ok("✅ VIP kích hoạt thành công!");
}

function freeKey() { /* giữ nguyên */
    let k = document.getElementById("free").value.trim();
    if (!KEY_DATA.community_keys?.includes(k)) return err("❌ Key FREE không đúng");
    let link = CONFIG.scripts?.android_free;
    save("🎁 FREE", link);
    ok("✅ Nhận FREE thành công!");
}

function err(t) { document.getElementById("result").innerHTML = `<span class='error'>${t}</span>`; }
function ok(t) { document.getElementById("result").innerHTML = `<span class='success'>${t}</span>`; }

function clearHis() {
    if(confirm("Xóa hết lịch sử?")) {
        history = [];
        localStorage.removeItem("his");
        render();
    }
}

function toggle() {
    document.getElementById("menu").classList.toggle("show");
}

load();
render();
</script>

</body>
</html>
