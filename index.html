<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #05050a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
}

/* Background cyberpunk */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
        linear-gradient(rgba(103,232,249,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(103,232,249,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: -2;
}

body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 25% 30%, rgba(167,139,250,0.12), transparent 60%),
                radial-gradient(circle at 75% 70%, rgba(103,232,249,0.12), transparent 60%);
    z-index: -1;
}

.main { width: 100%; max-width: 480px; padding: 20px; z-index: 2; }

.card {
    background: rgba(15, 23, 42, 0.72);
    backdrop-filter: blur(24px);
    border-radius: 32px;
    border: 1px solid rgba(103,232,249,0.25);
    padding: 40px 32px;
    box-shadow: 
        0 35px 70px -20px rgba(0,0,0,0.7),
        inset 0 0 60px rgba(103,232,249,0.1);
    text-align: center;
    position: relative;
}

/* Title */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
}

.title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #67e8f9, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 50px rgba(103,232,249,0.7);
}

/* Tag */
.tag {
    margin: 18px 0 28px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.tag span {
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(103,232,249,0.3);
    color: #c4d0ff;
}

/* Box */
.box {
    margin-top: 24px;
    padding: 24px;
    border-radius: 22px;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(103,232,249,0.2);
    text-align: left;
}

.box h3 {
    font-size: 16px;
    color: #67e8f9;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Input */
input {
    width: 100%;
    padding: 16px 18px;
    border-radius: 16px;
    border: 1px solid rgba(103,232,249,0.25);
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 16px;
}

input:focus {
    border-color: #67e8f9;
    box-shadow: 0 0 0 5px rgba(103,232,249,0.2);
    outline: none;
}

/* Button */
.rgb-btn {
    margin-top: 14px;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(90deg, #67e8f9, #a78bfa, #f472b6);
    color: #0f172a;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 10px 30px rgba(103,232,249,0.35);
}

.rgb-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 40px rgba(103,232,249,0.5);
}

.rgb-btn:active { transform: scale(0.96); }

/* Result */
.result { margin: 20px 0; min-height: 30px; font-size: 15.5px; font-weight: 500; }

/* History - ĐÃ SỬA SCROLL */
.history {
    margin-top: 28px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(103,232,249,0.18);
    max-height: 260px;
    overflow-y: auto;
    scroll-behavior: smooth;
    font-size: 14.5px;
}

/* Thanh scroll neon */
.history::-webkit-scrollbar {
    width: 6px;
}
.history::-webkit-scrollbar-thumb {
    background: linear-gradient(#67e8f9, #c084fc);
    border-radius: 10px;
}
.history::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
}

.history-item {
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.history-item:last-child { border-bottom: none; }

/* FAB & Menu */
.fab {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 60px;
    height: 60px;
    background: rgba(15,23,42,0.95);
    border: 2px solid #67e8f9;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 12px 35px rgba(103,232,249,0.3);
    z-index: 100;
    transition: 0.3s;
}

.fab:hover {
    background: #67e8f9;
    color: #0f172a;
    transform: scale(1.12);
}

.menu {
    position: fixed;
    bottom: 175px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
    transition: 0.4s ease;
    z-index: 99;
}

.menu.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
}

.menu a {
    width: 190px;
    padding: 15px 20px;
    background: rgba(15,23,42,0.95);
    border: 1px solid rgba(103,232,249,0.25);
    border-radius: 18px;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    text-align: center;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(103,232,249,0.2);
    border-color: #67e8f9;
    transform: translateX(-8px);
}
</style>
</head>

<body>

<div class="main">
    <div class="card">
        <div class="header">
            <i class="fas fa-bolt" style="font-size:36px;color:#67e8f9;"></i>
            <div class="title">TUN DEVELOPED</div>
        </div>
        
        <div class="tag">
            <span>🟢 Server Online</span>
            <span>🚀 Hiệu suất cao</span>
            <span>🔐 Bảo mật</span>
        </div>

        <div class="box">
            <h3><i class="fas fa-gem"></i> KEY VIP</h3>
            <input id="vip" placeholder="Nhập KEY VIP" autocomplete="off">
            <button class="rgb-btn" onclick="vip()">KÍCH HOẠT VIP</button>
        </div>

        <div class="box">
            <h3><i class="fas fa-gift"></i> KEY FREE</h3>
            <input id="free" placeholder="Nhập KEY FREE" autocomplete="off">
            <button class="rgb-btn" onclick="freeKey()">NHẬN FREE</button>
        </div>

        <div id="result" class="result"></div>

        <div id="history" class="history"></div>
        
        <button class="rgb-btn" style="background:#1e2937; color:#e2e8f0; margin-top:16px;" onclick="clearHis()">
            🗑 Xóa lịch sử
        </button>
    </div>
</div>

<div class="fab" onclick="toggle()">💬</div>

<div id="menu" class="menu">
    <a href="https://zalo.me/0378099746" target="_blank"><i class="fab fa-whatsapp"></i> Zalo</a>
    <a href="https://t.me/TunDeveloped" target="_blank"><i class="fab fa-telegram"></i> Telegram</a>
    <a href="https://www.facebook.com/share/1Ea2ZvmwRa/?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
</div>

<script>
const CONFIG_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/config.json";
const KEY_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/key.json";

let CONFIG = {}, KEY_DATA = {};
let history = JSON.parse(localStorage.getItem("his")) || [];

async function load() {
    try {
        CONFIG = await (await fetch(CONFIG_URL + "?t=" + Date.now())).json();
        KEY_DATA = await (await fetch(KEY_URL + "?t=" + Date.now())).json();
    } catch(e) { console.log("Lỗi load JSON"); }
}

function save(type, link) {
    history.unshift({type, link});
    if (history.length > 12) history.length = 12;
    localStorage.setItem("his", JSON.stringify(history));
    render();
}

function render() {
    const h = document.getElementById("history");
    if (history.length === 0) {
        h.innerHTML = `<span style="color:#64748b; font-style:italic;">Chưa có lịch sử</span>`;
        return;
    }
    h.innerHTML = history.map(i => `
        <div class="history-item">
            <span>${i.type}</span>
            <button class="rgb-btn" style="padding:8px 18px; font-size:13px; width:auto; margin:0;" onclick="copy('${i.link}')">COPY</button>
        </div>
    `).join("");
}

function copy(t) {
    navigator.clipboard.writeText(t);
    alert("✅ Đã copy link!");
}

function vip() {
    let k = document.getElementById("vip").value.trim();
    let obj = KEY_DATA.personal_keys?.find(x => x.key.trim() === k);
    if (!obj) return err("❌ Key VIP không đúng");
    let link = CONFIG.scripts?.[(obj.platform || "android") + "_full"];
    save("💎 VIP", link);
    ok("✅ VIP kích hoạt thành công!");
}

function freeKey() {
    let k = document.getElementById("free").value.trim();
    if (!KEY_DATA.community_keys?.includes(k)) return err("❌ Key FREE không đúng");
    let link = CONFIG.scripts?.android_free;
    save("🎁 FREE", link);
    ok("✅ Nhận FREE thành công!");
}

function err(t) { document.getElementById("result").innerHTML = `<span style="color:#f87171;">${t}</span>`; }
function ok(t) { document.getElementById("result").innerHTML = `<span style="color:#67e8f9;">${t}</span>`; }

function clearHis() {
    if (confirm("Xóa toàn bộ lịch sử?")) {
        history = [];
        localStorage.removeItem("his");
        render();
    }
}

function toggle() {
    document.getElementById("menu").classList.toggle("show");
}

load();
render();
</script>

</body>
</html>
