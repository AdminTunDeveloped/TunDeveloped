<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: 
        radial-gradient(circle at 50% 20%, rgba(0, 255, 200, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(120, 0, 255, 0.06) 0%, transparent 50%);
}

.main {
    width: 100%;
    max-width: 440px;
    padding: 20px;
}

.card {
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 32px 28px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,255,200,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: -1;
}

/* Title */
.title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #00ffcc, #00aaff, #cc00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
}

.tag {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
}

.tag span {
    font-size: 12px;
    background: rgba(255,255,255,0.05);
    padding: 6px 12px;
    border-radius: 9999px;
    border: 1px solid rgba(255,255,255,0.1);
    color: #a1a1aa;
    backdrop-filter: blur(4px);
}

/* Box */
.box {
    margin-top: 24px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: left;
}

.box h3 {
    font-size: 15px;
    color: #67e8f9;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Input */
input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.4);
    color: white;
    font-size: 15px;
    margin-bottom: 12px;
}

input:focus {
    outline: none;
    border-color: #67e8f9;
    box-shadow: 0 0 0 3px rgba(103, 232, 249, 0.2);
}

/* Button */
.rgb-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #00ffcc, #00aaff);
    color: #000;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
}

.rgb-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0, 255, 204, 0.3);
}

.rgb-btn:active {
    transform: scale(0.98);
}

/* Result */
.result {
    margin-top: 16px;
    min-height: 24px;
    font-size: 14.5px;
    font-weight: 500;
}

.success { color: #67e8f9; text-shadow: 0 0 10px #67e8f9; }
.error { color: #f87171; }

/* History */
.history {
    margin-top: 24px;
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 13.5px;
    text-align: left;
    max-height: 220px;
    overflow-y: auto;
}

.history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

.history-item:last-child { border-bottom: none; }

/* Clear button */
.clear {
    margin-top: 12px;
    background: rgba(255,255,255,0.08);
    color: #ddd;
}

/* FAB */
.fab {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(103, 232, 249, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2);
    z-index: 999;
    transition: all 0.3s ease;
}

.fab:hover {
    transform: scale(1.1);
    background: #67e8f9;
    color: #000;
}

/* Menu */
.menu {
    position: fixed;
    bottom: 160px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(15px);
    transition: all 0.3s ease;
    z-index: 999;
}

.menu.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
}

.menu a {
    width: 170px;
    padding: 14px 18px;
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(12px);
    color: white;
    text-align: center;
    font-size: 14px;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
}

.menu a:hover {
    background: rgba(103, 232, 249, 0.15);
    border-color: #67e8f9;
    transform: translateX(-4px);
}
</style>
</head>

<body>

<div class="main">
    <div class="card">
        <div class="title">TUN DEVELOPED</div>
        
        <div class="tag">
            <span>🟢 Server Online</span>
            <span>🚀 Hiệu suất cao</span>
            <span>🔐 Bảo mật cao</span>
        </div>

        <div class="box">
            <h3>💎 KEY VIP</h3>
            <input id="vip" placeholder="Nhập KEY VIP" autocomplete="off">
            <button class="rgb-btn" onclick="vip()">KÍCH HOẠT VIP</button>
        </div>

        <div class="box">
            <h3>🎁 KEY FREE</h3>
            <input id="free" placeholder="Nhập KEY FREE" autocomplete="off">
            <button class="rgb-btn" onclick="freeKey()">NHẬN FREE</button>
        </div>

        <div id="result" class="result"></div>

        <div id="history" class="history"></div>
        <button class="rgb-btn clear" onclick="clearHis()">🗑 Xóa lịch sử</button>
    </div>
</div>

<div class="fab" onclick="toggle()">💬</div>

<div id="menu" class="menu">
    <a href="https://zalo.me/0378099746" target="_blank">💬 Zalo</a>
    <a href="https://t.me/TunDeveloped" target="_blank">📢 Telegram</a>
    <a href="https://www.facebook.com/share/1Ea2ZvmwRa/?mibextid=wwXIfr" target="_blank">🌐 Facebook</a>
</div>

<script>
const CONFIG_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/config.json";
const KEY_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/key.json";

let CONFIG = {}, KEY_DATA = {};
let history = JSON.parse(localStorage.getItem("his")) || [];

async function load() {
    try {
        CONFIG = await (await fetch(CONFIG_URL + "?t=" + Date.now())).json();
        KEY_DATA = await (await fetch(KEY_URL + "?t=" + Date.now())).json();
    } catch(e) {
        console.log("Lỗi load JSON");
    }
}

function save(type, link) {
    history.unshift({type, link});
    if (history.length > 10) history.length = 10;
    localStorage.setItem("his", JSON.stringify(history));
    render();
}

function render() {
    let h = document.getElementById("history");
    if (history.length === 0) {
        h.innerHTML = "<span style='color:#64748b;'>📜 Chưa có lịch sử</span>";
        return;
    }
    h.innerHTML = "<b style='color:#67e8f9;'>📜 Lịch sử:</b>" + history.map(i => `
        <div class="history-item">
            <span>${i.type}</span>
            <button class="rgb-btn" style="padding:6px 12px;font-size:12px;" onclick="copy('${i.link}')">COPY</button>
        </div>
    `).join("");
}

function copy(t) {
    navigator.clipboard.writeText(t);
    alert("✅ Đã copy link!");
}

function vip() {
    let k = document.getElementById("vip").value.trim();
    let obj = KEY_DATA.personal_keys?.find(x => x.key.trim() === k);
    if (!obj) return err("❌ Key VIP không đúng");

    let link = CONFIG.scripts?.[(obj.platform || "android") + "_full"];
    save("💎 VIP", link);
    ok("✅ VIP kích hoạt thành công!");
}

function freeKey() {
    let k = document.getElementById("free").value.trim();
    if (!KEY_DATA.community_keys?.includes(k))
        return err("❌ Key FREE không đúng");

    let link = CONFIG.scripts?.android_free;
    save("🎁 FREE", link);
    ok("✅ Nhận FREE thành công!");
}

function err(t) {
    document.getElementById("result").innerHTML = `<div class='error'>${t}</div>`;
}

function ok(t) {
    document.getElementById("result").innerHTML = `<div class='success'>${t}</div>`;
}

function clearHis() {
    history = [];
    localStorage.removeItem("his");
    render();
}

function toggle() {
    document.getElementById("menu").classList.toggle("show");
}

load();
render();
</script>

</body>
</html>
