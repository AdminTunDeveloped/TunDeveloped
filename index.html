<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #05050a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
}

/* Background */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(103,232,249,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(103,232,249,0.018) 1px, transparent 1px);
    background-size: 70px 70px;
    z-index: -2;
}

body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 30%, rgba(167,139,250,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 75%, rgba(103,232,249,0.15) 0%, transparent 50%);
    z-index: -1;
}

.main { width: 100%; max-width: 460px; padding: 20px; }

.card {
    background: rgba(15, 23, 42, 0.78);
    backdrop-filter: blur(28px);
    border-radius: 32px;
    border: 1px solid rgba(103,232,249,0.3);
    padding: 38px 32px 32px;
    box-shadow: 0 40px 80px -20px rgba(0,0,0,0.75), inset 0 0 80px rgba(103,232,249,0.12);
    text-align: center;
    display: flex;
    flex-direction: column;
    min-height: 620px;
}

/* Title & Tag */
.header { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px; }
.title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #67e8f9, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.tag {
    margin: 16px 0 30px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.tag span {
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(103,232,249,0.35);
    color: #c4d0ff;
}

/* Box & Input */
.box {
    margin-top: 22px;
    padding: 24px;
    border-radius: 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(103,232,249,0.25);
}

.box h3 { font-size: 16.5px; color: #67e8f9; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }

input {
    width: 100%;
    padding: 17px 20px;
    border-radius: 16px;
    border: 1px solid rgba(103,232,249,0.3);
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 16px;
}

input:focus {
    border-color: #67e8f9;
    box-shadow: 0 0 0 5px rgba(103,232,249,0.25);
}

/* Button */
.rgb-btn {
    margin-top: 14px;
    width: 100%;
    padding: 17px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(90deg, #67e8f9, #a78bfa, #f472b6);
    color: #0f172a;
    font-weight: 700;
    font-size: 16.5px;
    cursor: pointer;
    box-shadow: 0 12px 35px rgba(103,232,249,0.4);
}

.rgb-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 45px rgba(103,232,249,0.55); }

/* Result */
.result { margin: 22px 0; min-height: 34px; font-size: 15.5px; font-weight: 600; }
.success { color: #67e8f9; }
.error { color: #f87171; }

/* HISTORY - ĐÃ FIX SCROLL TRÊN MOBILE */
.history {
    margin-top: 26px;
    flex: 1;
    padding: 20px;
    border-radius: 22px;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(103,232,249,0.25);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;   /* <-- Fix quan trọng cho mobile */
    scroll-behavior: smooth;
    max-height: 280px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
}

/* Scrollbar đẹp */
.history::-webkit-scrollbar { width: 7px; }
.history::-webkit-scrollbar-thumb {
    background: linear-gradient(#67e8f9, #c084fc);
    border-radius: 10px;
}

/* History item */
.history-item {
    padding: 13px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.history-item:last-child { border-bottom: none; }

/* FAB & Menu - ĐÃ SỬA HIỆU ỨNG */
.fab {
    position: fixed;
    bottom: 95px;
    right: 24px;
    width: 62px;
    height: 62px;
    background: rgba(15,23,42,0.95);
    border: 3px solid #67e8f9;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 15px 40px rgba(103,232,249,0.35);
    z-index: 1000;
    transition: all 0.3s ease;
}

.fab:hover {
    background: #67e8f9;
    color: #0f172a;
    transform: scale(1.15);
}

.menu {
    position: fixed;
    bottom: 175px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px) scale(0.95);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 999;
}

.menu.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0) scale(1);
}

.menu a {
    width: 195px;
    padding: 16px 22px;
    background: rgba(15,23,42,0.95);
    border: 1px solid rgba(103,232,249,0.3);
    border-radius: 18px;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    text-align: center;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(103,232,249,0.2);
    transform: translateX(-8px);
}
</style>
</head>

<body>

<div class="main">
    <div class="card">
        <div class="header">
            <i class="fas fa-bolt" style="font-size:38px;color:#67e8f9;"></i>
            <div class="title">TUN DEVELOPED</div>
        </div>
        
        <div class="tag">
            <span>🟢 Server Online</span>
            <span>🚀 Hiệu suất cao</span>
            <span>🔐 Bảo mật</span>
        </div>

        <div class="box">
            <h3><i class="fas fa-gem"></i> KEY VIP</h3>
            <input id="vip" placeholder="Nhập KEY VIP" autocomplete="off">
            <button class="rgb-btn" onclick="vip()">KÍCH HOẠT VIP</button>
        </div>

        <div class="box">
            <h3><i class="fas fa-gift"></i> KEY FREE</h3>
            <input id="free" placeholder="Nhập KEY FREE" autocomplete="off">
            <button class="rgb-btn" onclick="freeKey()">NHẬN FREE</button>
        </div>

        <div id="result" class="result"></div>

        <div id="history" class="history"></div>

        <button class="rgb-btn" style="background:#1e2937; color:#e2e8f0; margin-top:16px;" onclick="clearHis()">
            🗑 Xóa lịch sử
        </button>
    </div>
</div>

<!-- Nút hỗ trợ -->
<div class="fab" onclick="toggle()">💬</div>

<!-- Menu hỗ trợ -->
<div id="menu" class="menu">
    <a href="https://zalo.me/0378099746" target="_blank"><i class="fab fa-whatsapp"></i> Zalo</a>
    <a href="https://t.me/TunDeveloped" target="_blank"><i class="fab fa-telegram"></i> Telegram</a>
    <a href="https://www.facebook.com/share/1Ea2ZvmwRa/?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
</div>

<script>
// Script giữ nguyên chức năng cũ
const CONFIG_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/config.json";
const KEY_URL = "https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/key.json";

let CONFIG = {}, KEY_DATA = {};
let history = JSON.parse(localStorage.getItem("his")) || [];

async function load() {
    try {
        CONFIG = await (await fetch(CONFIG_URL + "?t=" + Date.now())).json();
        KEY_DATA = await (await fetch(KEY_URL + "?t=" + Date.now())).json();
    } catch(e) { console.log("Lỗi load JSON"); }
}

function save(type, link) {
    history.unshift({type, link});
    if (history.length > 12) history.length = 12;
    localStorage.setItem("his", JSON.stringify(history));
    render();
}

function render() {
    const h = document.getElementById("history");
    if (history.length === 0) {
        h.innerHTML = `<span style="color:#64748b;font-style:italic;display:block;text-align:center;padding:30px 0;">Chưa có lịch sử</span>`;
        return;
    }
    h.innerHTML = history.map(i => `
        <div class="history-item">
            <span>${i.type}</span>
            <button class="rgb-btn" style="padding:8px 20px;font-size:13px;width:auto;margin:0;" onclick="copy('${i.link}')">COPY</button>
        </div>
    `).join("");
}

function copy(t) {
    navigator.clipboard.writeText(t).then(() => alert("✅ Đã copy link!"));
}

function vip() {
    let k = document.getElementById("vip").value.trim();
    let obj = KEY_DATA.personal_keys?.find(x => x.key.trim() === k);
    if (!obj) return err("❌ Key VIP không đúng");
    let link = CONFIG.scripts?.[(obj.platform || "android") + "_full"];
    save("💎 VIP", link);
    ok("✅ VIP kích hoạt thành công!");
}

function freeKey() {
    let k = document.getElementById("free").value.trim();
    if (!KEY_DATA.community_keys?.includes(k)) return err("❌ Key FREE không đúng");
    let link = CONFIG.scripts?.android_free;
    save("🎁 FREE", link);
    ok("✅ Nhận FREE thành công!");
}

function err(t) {
    const res = document.getElementById("result");
    res.innerHTML = `<span class='error'>${t}</span>`;
    setTimeout(() => res.innerHTML = '', 5000);
}

function ok(t) {
    const res = document.getElementById("result");
    res.innerHTML = `<span class='success'>${t}</span>`;
    setTimeout(() => res.innerHTML = '', 5000);
}

function clearHis() {
    if (confirm("Xóa toàn bộ lịch sử?")) {
        history = [];
        localStorage.removeItem("his");
        render();
    }
}

// Toggle menu - đã tối ưu
function toggle() {
    const menu = document.getElementById("menu");
    menu.classList.toggle("show");
}

// Đóng menu khi click ra ngoài (tùy chọn)
document.addEventListener('click', function(e) {
    const menu = document.getElementById("menu");
    const fab = document.querySelector('.fab');
    if (!menu.contains(e.target) && !fab.contains(e.target)) {
        menu.classList.remove("show");
    }
});

load();
render();
</script>

</body>
</html>
