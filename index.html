<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUN DEVELOPED</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@600&family=Inter&display=swap" rel="stylesheet">

<!-- Font Awesome để hiện icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-pap0y1yZfrq/6Sb6V5kNw1ODkYFos+ZhjX+Z1U0lZg17eyy6y47v+xO1Ka/4Cw1tnj7iFz2K+x+/o1/6P6c1g==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Inter;
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.main{width:100%;max-width:420px;padding:20px}

.card{
    background:#020617;
    border-radius:16px;
    padding:20px;
    box-shadow:0 0 30px rgba(0,255,150,0.2);
    text-align:center;
}

.title{
    font-family:Bebas Neue;
    font-size:38px;
    letter-spacing:3px;
    color:white; /* chữ tĩnh */
}

.tag{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
}

.tag span{
    font-size:11px;
    background:#020617;
    padding:5px 8px;
    border-radius:8px;
    border:1px solid #1e293b;
    color:#94a3b8;
}

.box{
    margin-top:15px;
    padding:14px;
    border-radius:12px;
    background:#020617;
    border:1px solid #1e293b;
    text-align:left;
}

.box h3{
    font-size:13px;
    color:#22c55e;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:11px;
    border-radius:8px;
    border:1px solid #1e293b;
    background:#000;
    color:white;
    font-size:13px;
}

button{
    margin-top:10px;
    width:100%;
    padding:11px;
    border-radius:8px;
    border:none;
    background:#000;
    color:white;
    font-family:Montserrat;
    cursor:pointer;
}

.result{margin-top:12px;font-size:13px}
.success{color:#22c55e}
.error{color:#ef4444}

.history{
    margin-top:12px;
    padding:10px;
    border-radius:10px;
    background:#020617;
    border:1px solid #1e293b;
    font-size:12px;
    text-align:left;
}

.history-item{
    margin-top:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:6px;
}

.clear{
    margin-top:10px;
}

.fab{
    position:fixed;
    bottom:90px;
    right:18px;
    width:48px;
    height:48px;
    border-radius:50%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:999;
}

.menu{
    position:fixed;
    bottom:150px;
    right:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
    opacity:0;
    pointer-events:none;
    transform:translateY(10px);
    transition:0.25s;
    z-index:999;
}

.menu a{
    width:150px;
    padding:10px;
    border-radius:10px;
    background:#000;
    color:white;
    text-align:center;
    font-size:13px;
    text-decoration:none;
    font-family:Montserrat;
    position:relative;
}

.menu.show{
    opacity:1;
    pointer-events:auto;
    transform:translateY(0);
}
</style>
</head>

<body>

<div class="main">
<div class="card">

<div class="title">TUN DEVELOPED</div>

<div class="tag">
<span>🟢 Server Online</span>
<span>🚀 Hiệu suất cao</span>
<span>🔐Bảo mật</span>
</div>

<!-- VIP KEY -->
<div class="box">
    <h3><i class="fas fa-gem"></i> KEY VIP</h3>
    <input id="vip" placeholder="Nhập KEY VIP" autocomplete="off">
    <button onclick="vip()">KÍCH HOẠT VIP</button>
</div>

<!-- FREE KEY -->
<div class="box">
    <h3><i class="fas fa-gift"></i> KEY FREE</h3>
    <input id="free" placeholder="Nhập KEY FREE" autocomplete="off">
    <button onclick="freeKey()">NHẬN FREE</button>
</div>

<div id="result" class="result"></div>

<div id="history" class="history"></div>
<button class="clear" onclick="clearHis()">🗑 Xóa lịch sử</button>

</div>
</div>

<div class="fab" onclick="toggle()">💬</div>

<div id="menu" class="menu">
<a href="https://zalo.me/0378099746" target="_blank">💬 Zalo</a>
<a href="https://t.me/TunDeveloped" target="_blank">📢 Telegram</a>
<a href="https://www.facebook.com/share/1Ea2ZvmwRa/?mibextid=wwXIfr">🌐 Facebook</a>
</div>

<script>
const CONFIG_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/config.json";
const KEY_URL="https://raw.githubusercontent.com/AdminTunDeveloped/TunDeveloped/main/key.json";

let CONFIG={},KEY_DATA={};
let history=JSON.parse(localStorage.getItem("his"))||[];

async function load(){
    try{
        CONFIG=await (await fetch(CONFIG_URL+"?t="+Date.now())).json();
        KEY_DATA=await (await fetch(KEY_URL+"?t="+Date.now())).json();
    }catch(e){
        console.log("Lỗi load JSON");
    }
}

function save(type,link){
    history.unshift({type,link});
    if(history.length>10) history.length=10;
    localStorage.setItem("his",JSON.stringify(history));
    render();
}

function render(){
    let h=document.getElementById("history");
    if(history.length==0){
        h.innerHTML="📜 Chưa có lịch sử";
        return;
    }
    h.innerHTML="<b>📜 Lịch sử:</b>"+history.map(i=>`
        <div class="history-item">
            <span>${i.type}</span>
            <button onclick="copy('${i.link}')">COPY</button>
        </div>
    `).join("");
}

function copy(t){
    navigator.clipboard.writeText(t);
    alert("Đã copy link");
}

function vip(){
    let k=document.getElementById("vip").value.trim();
    let obj=KEY_DATA.personal_keys?.find(x=>x.key.trim()===k);
    if(!obj) return err("❌ Key VIP sai");
    let link=CONFIG.scripts?.[(obj.platform||"android")+"_full"];
    save("💎 VIP",link);
    ok("✔ VIP kích hoạt thành công");
}

function freeKey(){
    let k=document.getElementById("free").value.trim();
    if(!KEY_DATA.community_keys?.includes(k)) return err("❌ Key FREE sai");
    let link=CONFIG.scripts?.android_free;
    save("🎁 FREE",link);
    ok("✔ Nhận FREE thành công");
}

function err(t){
    document.getElementById("result").innerHTML="<div class='error'>"+t+"</div>";
}

function ok(t){
    document.getElementById("result").innerHTML="<div class='success'>"+t+"</div>";
}

function clearHis(){
    history=[];
    localStorage.removeItem("his");
    render();
}

function toggle(){
    document.getElementById("menu").classList.toggle("show");
}

load();
render();
</script>

</body>
</html>
